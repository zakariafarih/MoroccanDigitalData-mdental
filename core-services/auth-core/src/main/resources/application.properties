# Server configuration
server.port=8081
spring.application.name=auth-core

# Database configuration
# --- DB (example local) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/mdental_auth
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# List of allowed issuer patterns
mdental.auth.allowed-issuer-patterns=http://localhost:8080/realms/platform,http://localhost:8080/realms/mdental-

# Keycloak configuration for realm provisioning
keycloak.admin.url=http://localhost:8080/admin/realms
keycloak.auth.url=http://localhost:8080/realms/master/protocol/openid-connect/token
keycloak.realm.template.path=/opt/mdental/keycloak/realm-template.json

# Retry configuration
resilience4j.retry.instances.keycloak.max-attempts=3
resilience4j.retry.instances.keycloak.wait-duration=1s
resilience4j.retry.instances.keycloak.enable-exponential-backoff=true
resilience4j.retry.instances.keycloak.exponential-backoff-multiplier=2