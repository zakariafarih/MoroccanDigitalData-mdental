# Server configuration
server.port=8081
spring.application.name=auth-core

# Database configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mdental_auth}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/docs/auth-core-openapi.json

# Security configuration - standardized properties
mdental.auth.allowed-issuer-patterns=${ALLOWED_ISSUER_PATTERNS:http://localhost:8080/realms/platform,http://localhost:8080/realms/mdental-}

# Keycloak configuration - standardized properties
keycloak.base-url=${KEYCLOAK_BASE_URL:http://localhost:8080}
keycloak.admin-url=${KEYCLOAK_ADMIN_URL:http://localhost:8080/admin/realms}
keycloak.token-url=${KEYCLOAK_TOKEN_URL:http://localhost:8080/realms/master/protocol/openid-connect/token}
keycloak.admin-username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin-password=${KEYCLOAK_ADMIN_PASSWORD:admin}