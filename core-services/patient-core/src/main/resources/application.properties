spring.application.name=patient-core
server.port=8083

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

# Datasource
spring.datasource.url=jdbc:postgresql://postgres:5432/mdental_clinic
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update

# JWT Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/platform}

# Resilience4j, CORS, Actuator, etc.
