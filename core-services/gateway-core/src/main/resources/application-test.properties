# Disable discovery client and gateway discovery locator in tests
spring.cloud.discovery.enabled=false
spring.cloud.gateway.discovery.locator.enabled=false

# Static test route for clinic-core
spring.cloud.gateway.routes[0].id=test-clinic-core
spring.cloud.gateway.routes[0].uri=http://localhost:8082
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/clinics/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/clinics/(?<cid>[^/]+)(?<segment>/.*), /api/clinics/${cid}${segment}
spring.cloud.gateway.routes[0].filters[1]=AddRequestHeader=X-Gateway-Request-Id, test-request-id

# JWT config for testing
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/test

# Disable Eureka in test
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Logging for test
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.security=DEBUG

# Allow your Keycloak issuer URI as a valid Mdental-Security issuer
mdental.auth.allowedIssuerPatterns[0]=${spring.security.oauth2.resourceserver.jwt.issuer-uri}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=\
  http://localhost:8080/realms/platform/protocol/openid-connect/certs

spring.main.web-application-type=reactive
